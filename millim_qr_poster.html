.wordmark{font-family:'Cairo';font-weight:800;font-size:38px}
.tag{opacity:.9;font-size:15px;margin-top:2px}
.inapp{display:inline-block;background:rgba(255,255,255,.15);font-size:12px;font-weight:700;padding:5px 14px;border-radius:20px;margin-top:12px}
.body{text-align:center;padding:26px 24px 30px}
.body h2{font-size:20px;margin-bottom:4px}.body p{color:var(--slate);font-size:14px;margin-bottom:18px}
.qr{width:250px;height:250px;margin:0 auto;border:2px solid var(--gray);border-radius:22px;padding:12px}
.qr img{width:100%;height:100%;object-fit:contain}
.url{margin-top:12px;font-size:12px;color:var(--slate);direction:ltr}
